# See https://wiki.hyprland.org/Configuring/Binds/
# Sourced after hyprland/keybinds.conf — use unbind* before rebinding the same keys.

#!
##! User
bind = Ctrl+Super, Slash, exec, xdg-open ~/.config/illogical-impulse/config.json # Edit shell config
bind = Ctrl+Super+Alt, Slash, exec, xdg-open ~/.config/hypr/custom/keybinds.conf # Edit extra keybinds

#!
##! Personal overrides (from ~/.config/hypr/hyprland/keybinds.conf)

# Shell
unbind = Super, B
bindd = Super, H, App launcher (all apps), global, quickshell:overviewAllAppsToggle # App launcher (all apps)

# Recording: drop Super+Alt+R and Super+Shift+Alt+R (keep Super+Shift+R and Ctrl+Alt+R from defaults)
unbindl = Super+Alt, R
unbindl = Super+Shift+Alt, R

# Window
unbind = Alt, F4
unbind = Super, Q
bind = Alt, F4, forcekillactive, # Force Kill (Windows)
bind = Super, Q, closewindow, activewindow # Close

bind = ALT, Tab, exec, snappy-switcher next
bind = ALT SHIFT, Tab, exec, snappy-switcher prev

unbinde = Super, Semicolon
unbinde = Super, Apostrophe
binde = Super, Semicolon, splitratio, -0.1 # [hidden]
binde = Super, Apostrophe, splitratio, +0.1 # [hidden]

bind = Super, Space, togglefloating, # Float/Tile (Super+Space)

# Named special workspaces (define workspace = special:music etc. if needed)
unbind = Super+Alt, S
bind = Super+Alt, S, movetoworkspacesilent, special:music # Send to music workspace
bind = Super+Alt, B, movetoworkspacesilent, special:browser # Send to browser workspace
bind = Super+Alt, R, movetoworkspacesilent, special:chat # Send to chat workspace

unbind = Ctrl+Super, S
bind = Ctrl+Super, S, togglespecialworkspace, music # [hidden]

unbind = Super, S
bind = Super, S, togglespecialworkspace, music # Focus music workspace
bind = Super, R, togglespecialworkspace, chat # Focus chat workspace
bind = Super, B, togglespecialworkspace, browser # Focus browser workspace

# Apps - launcher preference order
unbind = Super, W
unbind = Super, C
bind = Super, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "firefox" "google-chrome-stable" "zen-browser" "brave" "chromium" "microsoft-edge-stable" "opera" "librewolf" # Browser
bind = Super, C, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "code" "codium" "cursor" "zed" "zedit" "zeditor" "kate" "gnome-text-editor" "emacs" "command -v nvim && kitty -1 nvim" "command -v micro && kitty -1 micro" # Code editor

