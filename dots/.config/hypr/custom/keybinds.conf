##! Services
bind = Super+Alt, D, exec, ~/.config/hypr/custom/scripts/toggle_docker.sh # Toggle Docker on/off
bind = Super, A, exec, /home/tslove/projects/nova-npu/.venv/bin/nova --type-command # Nova type command
bind = Super, Z, exec, /home/tslove/projects/nova-npu/.venv/bin/nova --trigger-record # Nova voice typing
bind = Super+Alt, A, exec, ~/.config/hypr/custom/scripts/nova_toggle_wake.sh # Toggle wake word
bind = Super+Alt, Z, exec, ~/.config/hypr/custom/scripts/nova_toggle_tts.sh # Toggle TTS
bind = Super+Alt, B, exec, kitty "bluetui" # Bluetooth TUI
bind = Super+Alt, V, exec, ~/Documents/vpn-toggle.sh # VPN toggle (polkit GUI)

##! Workspace Management
$mainMod = super

# Move active window to a workspace with Super+Shift+[0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Switch to next/previous workspace on current monitor
bind = $mainMod Alt, Right, workspace, +1
bind = $mainMod Alt, Left, workspace, -1

