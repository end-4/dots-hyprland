# Personal workspace layout (sourced after workspaces.conf).
# Edit monitor names to match `hyprctl monitors`.
# If nwg-displays also writes workspace= lines into workspaces.conf, comment out duplicates here.

# ######## Default workspace -> monitor ########
# workspace=1,monitor:DP-1,default:true
# workspace=2,monitor:DP-1
# workspace=3,monitor:DP-1
# workspace=4,monitor:DP-1
# workspace=5,monitor:DP-1
# workspace=6,monitor:DP-2,default:true
# workspace=7,monitor:DP-2
# workspace=8,monitor:DP-2
# workspace=9,monitor:DP-2
# workspace=10,monitor:DP-2

# ######## Workspace rules (named specials: pairs with custom/keybinds.conf) ########
workspace = special:browser, on-created-empty:~/.config/hypr/hyprland/scripts/launch_first_available.sh "firefox" "google-chrome-stable" "zen-browser" "brave" "chromium" "microsoft-edge-stable" "opera" "librewolf"
workspace = special:chat, on-created-empty:~/.config/hypr/hyprland/scripts/launch_first_available.sh "discord" "equibop" "Telegram"
workspace = special:music, on-created-empty:~/.config/hypr/hyprland/scripts/launch_first_available.sh "spotify-launcher" "spotube" "rhythmbox" "lollypop" "clementine"