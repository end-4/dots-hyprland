# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

# Input method
# exec-once = fcitx5

# NetworkManager secret agent (provides WiFi password handling to NM)
# GDK_BACKEND=x11 prevents the tray icon on Wayland while keeping the agent running
exec-once = env GDK_BACKEND=x11 nm-applet

