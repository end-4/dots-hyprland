$lock_cmd = kill $(cat /tmp/flux-screensaver.pid 2>/dev/null) 2>/dev/null; rm -f /tmp/flux-screensaver.pid 2>/dev/null; pkill flux-desktop 2>/dev/null; hyprctl dispatch 'hl.dsp.global("quickshell:lock")' & pidof qs quickshell hyprlock || hyprlock
# $lock_cmd = pidof hyprlock || hyprlock
$suspend_cmd = qs -c ii ipc call mpris pauseAll 2>/dev/null; systemctl suspend || loginctl suspend

general {
    lock_cmd = $lock_cmd
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.global("quickshell:lockFocus")'
    inhibit_sleep = 3
}

listener {
    timeout = 10
    on-timeout = bash -c '"${XDG_BIN_HOME:-$HOME/.config/quickshell/ii/scripts/flux}/flux-screensaver.sh"'
    on-resume = bash -c '"${XDG_BIN_HOME:-$HOME/.config/quickshell/ii/scripts/flux}/flux-screensaver.sh" --resume'
}

listener {
    timeout = 300 # 5mins
    on-timeout = loginctl lock-session
}

listener {
    timeout = 600 # 10mins
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}

listener {
    timeout = 900 # 15mins
    on-timeout = $suspend_cmd
}
