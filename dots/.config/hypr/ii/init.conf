# Illogical impulse (end-4) Hyprland profile
# Switch profiles in ~/.config/hypr/hyprland.conf via $HYPR_DESKTOP_SHELL.

$qsConfig = ii # Required Quickshell Config Name

# Default Config
source = env.conf
source = execs.conf
source = general.conf
source = rules.conf
source = colors.conf
source = keybinds.conf

# Custom Config
source = custom/env.conf
source = custom/execs.conf
source = custom/general.conf
source = custom/rules.conf
source = custom/keybinds.conf
source = custom/workspaces.conf

# Host Specific
source = ../workspaces.conf
source = ../monitors.conf

# Runtime overrides (Quickshell HyprlandConfig); shared across profiles
source = ../shellOverrides/main.conf