name: Sync Upstream

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: '0 * * * *' # Runs every hour

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: uwsm # Checkout your uwsm branch

      - name: Add upstream remote
        run: git remote add upstream https://github.com/end-4/dots-hyprland.git

      - name: Fetch upstream changes
        run: git fetch upstream

      - name: Configure Git user
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream into uwsm (will fail on conflict)
        run: git merge --no-ff upstream/main -m "Merge upstream/main into uwsm"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GITHUB_TOKEN is automatically provided

      - name: Push changes
        run: git push origin uwsm
