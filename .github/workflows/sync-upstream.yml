name: Sync Upstream

on:
  schedule:
    # Runs every hour at minute 0 (e.g., 00:00, 01:00, 02:00 UTC)
    # For more on cron syntax: https://crontab.guru/
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows you to manually trigger the workflow from the GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Specifies the branch to checkout from your fork
        ref: uwsm
        # Fetches all history for all branches and tags
        # Required for rebasing or complex merges
        fetch-depth: 0
        # Token for pushing changes back to your fork
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Add upstream remote
      run: git remote add upstream https://github.com/end-4/dots-hyprland.git

    - name: Fetch upstream changes
      run: git fetch upstream

    - name: Merge upstream into uwsm
      run: |
        git config user.name github-actions[bot]
        git config user.email github-actions[bot]@users.noreply.github.com
        # Attempt to merge upstream/main into your uwsm branch.
        # `--ff-only` ensures it only merges if it's a fast-forward,
        # meaning no conflicts. If there are conflicts or diverging histories, this will fail.
        # NOTE: Assuming the UPSTREAM's main branch is still named 'main'.
        # If upstream's main branch is also 'uwsm', change 'upstream main' to 'upstream uwsm'.
        git pull upstream main --ff-only
        # If the pull was successful (no conflicts, fast-forward), push the changes back to your fork
        git push origin uwsm
      env:
        # This is the token that GitHub Actions provides by default,
        # which has permissions to push to your repository.
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
