# Bar, wallpaper
exec-once = uwsm app -- swww-daemon --format xrgb --no-cache
exec-once = uwsm app -- sleep 0.5; uwsm app -- swww img "$(cat ~/.local/state/quickshell/user/generated/wallpaper/path.txt)" --transition-step 100 --transition-fps 120 --transition-type grow --transition-angle 30 --transition-duration 1
exec-once = uwsm app -- ~/.config/hypr/hyprland/scripts/start_geoclue_agent.sh & gammastep
exec-once = uwsm app -- qs &

# Input method
exec-once = uwsm app -- fcitx5

# Core components (authentication, lock screen, notification daemon)
exec-once = uwsm app -- gnome-keyring-daemon --start --components=secrets
exec-once = uwsm app -- /usr/lib/polkit-kde-authentication-agent-1 || /usr/libexec/polkit-kde-authentication-agent-1  || /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 || /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- dbus-update-activation-environment --all
exec-once = uwsm app -- sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # Some fix idk
exec-once = uwsm app -- hyprpm reload

# Audio
exec-once = uwsm app -- easyeffects --gapplication-service

# Clipboard: history
# exec-once = wl-paste --watch cliphist store &
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

# Cursor
exec-once = uwsm app -- hyprctl setcursor Bibata-Modern-Classic 24

