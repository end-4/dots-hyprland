# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/
# Generated by nwg-displays on 2024-10-19 at 17:38:39. Do not edit manually.

# Put soruces here

# monitors
source = ~/.config/hypr/monitors.conf

#Hypr pywal
source = ~/.cache/wal/colors-hypr.conf

$active = $color1
$inactive = $color2

general {
   border_size = 2 
}

group {
	col.border_active = rgb($active)
	col.border_inactive = rgb($inactive)
	
	groupbar {
		col.active = rgb($inactive)
		col.inactive = rgb($active)
		scrolling = true
		font_size = 10
	}
}
# to change opaciity edit ~/.config/hypr/scripts/toggle-opacity.py
decoration {
    active_opacity = 0.95
    inactive_opacity = 0.92
  fullscreen_opacity = 1
  dim_around = 0.9
 
  blur {
     size = 4
     passes = 4
  }
}
